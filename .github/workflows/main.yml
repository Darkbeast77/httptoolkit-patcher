name: Release Build (Windows)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create dist directory
        shell: bash
        run: mkdir -p dist

      - name: Build for Windows
        shell: bash
        run: |
          npm run build
          npx pkg dist/bundle.cjs --targets node18-win-x64 --compress GZip --out-path dist/

      - name: List built files (debug - Windows)
        shell: pwsh
        run: Get-ChildItem -Path dist/ | Format-Table -AutoSize

      - name: Rename executable (Windows)
        shell: pwsh
        run: |
          if (Test-Path dist/bundle.exe) { Move-Item -Force dist/bundle.exe dist/httptoolkit-patcher-win-x64.exe }
          if (Test-Path dist/bundle-x64.exe) { Move-Item -Force dist/bundle-x64.exe dist/httptoolkit-patcher-win-x64.exe }
          Remove-Item -Force dist/bundle.cjs -ErrorAction SilentlyContinue

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: binaries-windows
          path: release

      - name: Show release files
        run: ls -lah release/

      - name: Create/Update tag v2.0.5 on this commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch --tags
          git tag -f v2.0.5 "$GITHUB_SHA"
          git push -f origin refs/tags/v2.0.5

      - name: Create GitHub Release for v2.0.5
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.5
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release 2.0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
